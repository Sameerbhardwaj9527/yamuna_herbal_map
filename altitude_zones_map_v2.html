<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aatmanirbhar Society — Altitude & Zone Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0ede8;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── SIDEBAR ── */
#sidebar{
  position:absolute;top:0;left:0;height:100%;width:300px;
  background:#fff;z-index:1000;display:flex;flex-direction:column;
  border-right:1px solid #e8e4dc;transition:transform .3s ease;
}
#sidebar.collapsed{transform:translateX(-300px)}
#sidebar-toggle{
  position:absolute;top:50%;right:-36px;transform:translateY(-50%);
  width:36px;height:48px;background:#fff;border:1px solid #e8e4dc;
  border-left:none;border-radius:0 8px 8px 0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:#666;z-index:1001;transition:background .15s;
}
#sidebar-toggle:hover{background:#f5f3ef}

#sidebar-header{
  padding:18px 18px 14px;border-bottom:1px solid #f0ede8;flex-shrink:0;
}
#sidebar-header h1{font-size:14px;font-weight:600;color:#1a1a18;line-height:1.3}
#sidebar-header p{font-size:11px;color:#999;margin-top:3px}

/* Zone filter buttons */
#zone-filters{display:flex;gap:6px;padding:12px 14px;border-bottom:1px solid #f0ede8;flex-shrink:0;flex-wrap:wrap}
.zone-btn{
  display:flex;align-items:center;gap:5px;padding:5px 10px;
  border-radius:20px;border:1.5px solid transparent;cursor:pointer;
  font-size:11px;font-weight:500;transition:all .15s;flex:1;justify-content:center;
}
.zone-btn .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.zone-btn.tropical{border-color:#16a34a;color:#166534;background:#f0fdf4}
.zone-btn.subtropical{border-color:#d97706;color:#92400e;background:#fffbeb}
.zone-btn.temperate{border-color:#2563eb;color:#1e3a8a;background:#eff6ff}
.zone-btn.all{border-color:#6b7280;color:#374151;background:#f9fafb}
.zone-btn.inactive{opacity:.4;background:#f5f5f5;border-color:#ddd;color:#999}
.zone-btn .dot.tropical{background:#22c55e}
.zone-btn .dot.subtropical{background:#f59e0b}
.zone-btn .dot.temperate{background:#3b82f6}
.zone-btn .dot.all{background:#9ca3af}

/* Search */
#search-wrap{padding:10px 14px;border-bottom:1px solid #f0ede8;flex-shrink:0}
#search{
  width:100%;padding:7px 10px 7px 32px;border:1px solid #e0ddd6;
  border-radius:8px;font-size:12px;color:#1a1a18;background:#fafaf8;
  outline:none;transition:border .15s;
}
#search:focus{border-color:#9ca3af;background:#fff}
#search-wrap{position:relative}
#search-icon{position:absolute;left:22px;top:50%;transform:translateY(-50%);font-size:13px;color:#aaa;pointer-events:none}

/* Village list */
#village-list{flex:1;overflow-y:auto;padding:6px 0}
.v-item{
  display:flex;align-items:center;gap:10px;padding:9px 16px;
  cursor:pointer;transition:background .1s;border-left:3px solid transparent;
}
.v-item:hover{background:#fafaf8}
.v-item.active{background:#f0ede8;border-left-color:#555}
.v-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.v-dot.tropical{background:#22c55e;border:1.5px solid #16a34a}
.v-dot.subtropical{background:#f59e0b;border:1.5px solid #d97706}
.v-dot.temperate{background:#3b82f6;border:1.5px solid #2563eb}
.v-name{font-size:12px;font-weight:500;color:#1a1a18;flex:1}
.v-alt{font-size:11px;color:#aaa;flex-shrink:0}
.v-empty{padding:24px 16px;text-align:center;font-size:12px;color:#bbb}

/* Stats footer */
#stats-footer{
  border-top:1px solid #f0ede8;padding:12px 16px;flex-shrink:0;
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;
}
.stat-box{text-align:center;padding:8px 4px;border-radius:8px}
.stat-box.tropical{background:#f0fdf4}
.stat-box.subtropical{background:#fffbeb}
.stat-box.temperate{background:#eff6ff}
.stat-num{font-size:18px;font-weight:600;line-height:1}
.stat-num.tropical{color:#16a34a}
.stat-num.subtropical{color:#d97706}
.stat-num.temperate{color:#2563eb}
.stat-label{font-size:9px;color:#999;margin-top:3px;line-height:1.2}

/* ── MAP ── */
#map{flex:1;margin-left:300px;transition:margin .3s ease}
#map.full{margin-left:0}

/* ── POPUP CARD ── */
#popup-card{
  position:absolute;bottom:24px;right:24px;width:260px;
  background:#fff;border-radius:14px;border:1px solid #e8e4dc;
  z-index:1000;overflow:hidden;
  transform:translateY(20px);opacity:0;pointer-events:none;
  transition:all .2s ease;
}
#popup-card.visible{transform:translateY(0);opacity:1;pointer-events:all}
.popup-banner{height:6px;width:100%}
.popup-banner.tropical{background:#22c55e}
.popup-banner.subtropical{background:#f59e0b}
.popup-banner.temperate{background:#3b82f6}
.popup-body{padding:14px 16px 16px}
.popup-village{font-size:16px;font-weight:600;color:#1a1a18;margin-bottom:4px}
.popup-zone-tag{
  display:inline-block;font-size:10px;font-weight:500;
  padding:2px 8px;border-radius:20px;margin-bottom:12px;
}
.popup-zone-tag.tropical{background:#dcfce7;color:#166534}
.popup-zone-tag.subtropical{background:#fef3c7;color:#92400e}
.popup-zone-tag.temperate{background:#dbeafe;color:#1e3a8a}
.popup-rows{display:flex;flex-direction:column;gap:6px}
.popup-row{display:flex;justify-content:space-between;align-items:center;font-size:12px}
.popup-row .lbl{color:#999}
.popup-row .val{color:#1a1a18;font-weight:500}
.popup-close{
  position:absolute;top:10px;right:12px;background:none;border:none;
  cursor:pointer;font-size:15px;color:#ccc;line-height:1;transition:color .1s;
}
.popup-close:hover{color:#666}

/* ── MAP CONTROLS OVERRIDE ── */
.leaflet-top.leaflet-right{top:16px;right:16px}
.leaflet-control-zoom{border:1px solid #e8e4dc !important;border-radius:8px !important;overflow:hidden}
.leaflet-control-zoom a{color:#444 !important;border:none !important}

/* ── VILLAGE LABELS ── */
.village-label{
  background:rgba(255,255,255,0.93);border:none !important;
  box-shadow:0 1px 4px rgba(0,0,0,0.12) !important;
  font-size:10.5px;font-weight:500;color:#1a1a18;
  padding:2px 6px;border-radius:5px;white-space:nowrap;
}

/* altitude legend on map */
#alt-legend{
  position:absolute;bottom:24px;left:320px;
  background:#fff;border:1px solid #e8e4dc;border-radius:10px;
  padding:10px 14px;z-index:999;min-width:150px;
  transition:left .3s;
}
#alt-legend.full{left:20px}
#alt-legend h4{font-size:10px;font-weight:600;color:#999;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.leg-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.leg-row:last-child{margin-bottom:0}
.leg-circle{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.leg-circle.tropical{background:#22c55e;border:1.5px solid #16a34a}
.leg-circle.subtropical{background:#f59e0b;border:1.5px solid #d97706}
.leg-circle.temperate{background:#3b82f6;border:1.5px solid #2563eb}
.leg-text{font-size:11px;color:#555}
.leg-sub{font-size:10px;color:#aaa}

@media(max-width:600px){
  #sidebar{width:260px}
  #sidebar.collapsed{transform:translateX(-260px)}
  #map{margin-left:260px}
  #popup-card{right:10px;bottom:10px;width:230px}
  #alt-legend{left:270px;bottom:10px}
  #alt-legend.full{left:10px}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <button id="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">◀</button>

  <div id="sidebar-header">
    <h1>Aatmanirbhar Society</h1>
    <p>Altitude & Zone Map · Yamuna valley, Uttarkashi</p>
  </div>

  <div id="zone-filters">
    <button class="zone-btn all active" onclick="filterZone('all')">
      <span class="dot all"></span> All
    </button>
    <button class="zone-btn tropical" onclick="filterZone('tropical')">
      <span class="dot tropical"></span> Tropical
    </button>
    <button class="zone-btn subtropical" onclick="filterZone('subtropical')">
      <span class="dot subtropical"></span> Sub-tropical
    </button>
    <button class="zone-btn temperate" onclick="filterZone('temperate')">
      <span class="dot temperate"></span> Temperate
    </button>
  </div>

  <div id="search-wrap">
    <span id="search-icon">⌕</span>
    <input id="search" type="text" placeholder="Search village..." oninput="filterSearch(this.value)">
  </div>

  <div id="village-list"></div>

  <div id="stats-footer">
    <div class="stat-box tropical">
      <div class="stat-num tropical" id="cnt-tropical">5</div>
      <div class="stat-label">Tropical<br>≤1000 m</div>
    </div>
    <div class="stat-box subtropical">
      <div class="stat-num subtropical" id="cnt-subtropical">19</div>
      <div class="stat-label">Sub-tropical<br>1000–2000 m</div>
    </div>
    <div class="stat-box temperate">
      <div class="stat-num temperate" id="cnt-temperate">5</div>
      <div class="stat-label">Temperate<br>&gt;2000 m</div>
    </div>
  </div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- ALTITUDE LEGEND -->
<div id="alt-legend">
  <h4>Zone legend</h4>
  <div class="leg-row"><div class="leg-circle tropical"></div><div><div class="leg-text">Tropical</div><div class="leg-sub">≤1000 m</div></div></div>
  <div class="leg-row"><div class="leg-circle subtropical"></div><div><div class="leg-text">Sub-tropical</div><div class="leg-sub">1000–2000 m</div></div></div>
  <div class="leg-row"><div class="leg-circle temperate"></div><div><div class="leg-text">Temperate</div><div class="leg-sub">&gt;2000 m</div></div></div>
</div>

<!-- POPUP CARD -->
<div id="popup-card">
  <button class="popup-close" onclick="closePopup()">✕</button>
  <div class="popup-banner" id="pc-banner"></div>
  <div class="popup-body">
    <div class="popup-village" id="pc-name"></div>
    <span class="popup-zone-tag" id="pc-tag"></span>
    <div class="popup-rows">
      <div class="popup-row"><span class="lbl">Altitude</span><span class="val" id="pc-alt"></span></div>
      <div class="popup-row"><span class="lbl">Zone</span><span class="val" id="pc-zone"></span></div>
      <div class="popup-row"><span class="lbl">Coordinates</span><span class="val" id="pc-coords"></span></div>
    </div>
  </div>
</div>

<script>
const VILLAGES = [
  // TROPICAL
  {name:"Tauli",      alt:790,  zone:"tropical",    lat:30.6950, lng:78.0200},
  {name:"Papdiyan",   alt:750,  zone:"tropical",    lat:30.7050, lng:78.0400},
  {name:"Latikhet",   alt:740,  zone:"tropical",    lat:30.7150, lng:78.0600},
  {name:"Marod",      alt:866,  zone:"tropical",    lat:30.7300, lng:78.0800},
  {name:"Naingaon",   alt:894,  zone:"tropical",    lat:30.7450, lng:78.1000},
  // SUBTROPICAL
  {name:"Suranshu",   alt:1350, zone:"subtropical", lat:30.7800, lng:78.1400},
  {name:"Bangaon",    alt:1170, zone:"subtropical", lat:30.7600, lng:78.1200},
  {name:"Kandari",    alt:1632, zone:"subtropical", lat:30.8000, lng:78.1600},
  {name:"Lakhamandal",alt:1185, zone:"subtropical", lat:30.6800, lng:78.0500},
  {name:"Naugaon",    alt:1150, zone:"subtropical", lat:30.7500, lng:78.1050},
  {name:"Kotiyal",    alt:1290, zone:"subtropical", lat:30.8100, lng:78.1800},
  {name:"Manjiyal",   alt:1265, zone:"subtropical", lat:30.8200, lng:78.1900},
  {name:"Bhatiya",    alt:1577, zone:"subtropical", lat:30.8050, lng:78.2200},
  {name:"Kanseru",    alt:1282, zone:"subtropical", lat:30.7900, lng:78.2000},
  {name:"Sunaldi",    alt:1428, zone:"subtropical", lat:30.8300, lng:78.2100},
  {name:"Uprari",     alt:1400, zone:"subtropical", lat:30.8400, lng:78.1700},
  {name:"Chakargaon", alt:1388, zone:"subtropical", lat:30.8250, lng:78.1500},
  {name:"Kharyasem",  alt:1562, zone:"subtropical", lat:30.8600, lng:78.2400},
  {name:"Tunalka",    alt:1317, zone:"subtropical", lat:30.8150, lng:78.2300},
  {name:"Murari",     alt:1210, zone:"subtropical", lat:30.7700, lng:78.1700},
  {name:"Barkot",     alt:1310, zone:"subtropical", lat:30.8167, lng:78.2167},
  {name:"Paunti",     alt:1233, zone:"subtropical", lat:30.8050, lng:78.1950},
  {name:"Kumola",     alt:1872, zone:"subtropical", lat:30.8700, lng:78.2800},
  {name:"Chiwala",    alt:1521, zone:"subtropical", lat:30.8450, lng:78.2600},
  // TEMPERATE
  {name:"Rana Chatti",alt:2035, zone:"temperate",   lat:30.9500, lng:78.4000},
  {name:"Bariya",     alt:2124, zone:"temperate",   lat:30.8500, lng:78.2500},
  {name:"Dangru",     alt:2318, zone:"temperate",   lat:30.9000, lng:78.3500},
  {name:"Kharsali",   alt:2622, zone:"temperate",   lat:30.9833, lng:78.4500},
  {name:"Banas",      alt:2326, zone:"temperate",   lat:30.8800, lng:78.3800},
];

const ZONE_CFG = {
  tropical:    {color:"#16a34a", fill:"#22c55e", label:"Tropical",     range:"≤1000 m"},
  subtropical: {color:"#d97706", fill:"#f59e0b", label:"Sub-tropical", range:"1000–2000 m"},
  temperate:   {color:"#2563eb", fill:"#3b82f6", label:"Temperate",    range:">2000 m"},
};

// Init map
const map = L.map('map',{zoomControl:true}).setView([30.83,78.22],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap contributors',maxZoom:18
}).addTo(map);

// State
let activeZone = 'all';
let activeVillage = null;
let markers = [];
let sidebarOpen = true;

// Build markers
VILLAGES.forEach((v,i) => {
  const cfg = ZONE_CFG[v.zone];
  const radius = v.zone==='temperate'?10:v.zone==='subtropical'?9:8;

  const m = L.circleMarker([v.lat,v.lng],{
    radius, color:cfg.color, fillColor:cfg.fill,
    fillOpacity:0.88, weight:2,
  }).addTo(map);

  m.bindTooltip(v.name,{
    permanent:true, direction:'top', offset:[0,-radius-2],
    className:'village-label'
  });

  m.on('click',()=>selectVillage(i));
  markers.push(m);
});

// Sidebar list
function buildList(filtered){
  const el = document.getElementById('village-list');
  if(!filtered.length){
    el.innerHTML='<div class="v-empty">No villages found</div>';return;
  }
  el.innerHTML = filtered.map(i=>{
    const v = VILLAGES[i];
    return `<div class="v-item ${activeVillage===i?'active':''}" onclick="selectVillage(${i})">
      <div class="v-dot ${v.zone}"></div>
      <div class="v-name">${v.name}</div>
      <div class="v-alt">${v.alt} m</div>
    </div>`;
  }).join('');
}

function getFiltered(zone, query){
  return VILLAGES.map((_,i)=>i).filter(i=>{
    const v = VILLAGES[i];
    const zoneOk = zone==='all' || v.zone===zone;
    const searchOk = !query || v.name.toLowerCase().includes(query.toLowerCase());
    return zoneOk && searchOk;
  });
}

let currentQuery = '';

function filterZone(zone){
  activeZone = zone;
  // Update buttons
  document.querySelectorAll('.zone-btn').forEach(b=>{
    b.classList.toggle('inactive', !b.classList.contains(zone==='all'?'all':zone) && !(zone==='all'&&b.classList.contains('all')));
  });
  // Show/hide markers
  markers.forEach((m,i)=>{
    const v = VILLAGES[i];
    const show = zone==='all'||v.zone===zone;
    if(show) m.addTo(map); else map.removeLayer(m);
  });
  buildList(getFiltered(zone,currentQuery));
}

function filterSearch(q){
  currentQuery = q;
  buildList(getFiltered(activeZone,q));
}

function selectVillage(i){
  activeVillage = i;
  const v = VILLAGES[i];
  const cfg = ZONE_CFG[v.zone];

  // Fly to
  map.flyTo([v.lat,v.lng],13,{duration:0.8});

  // Pulse the marker
  markers[i].setStyle({weight:4,radius:13});
  setTimeout(()=>markers[i].setStyle({weight:2,radius:v.zone==='temperate'?10:v.zone==='subtropical'?9:8}),600);

  // Popup card
  document.getElementById('pc-banner').className='popup-banner '+v.zone;
  document.getElementById('pc-name').textContent=v.name;
  const tag=document.getElementById('pc-tag');
  tag.textContent=cfg.label+' zone · '+cfg.range;
  tag.className='popup-zone-tag '+v.zone;
  document.getElementById('pc-alt').textContent=v.alt+' m';
  document.getElementById('pc-zone').textContent=cfg.label;
  document.getElementById('pc-coords').textContent=v.lat.toFixed(4)+', '+v.lng.toFixed(4);
  document.getElementById('popup-card').classList.add('visible');

  // Highlight list
  buildList(getFiltered(activeZone,currentQuery));
  // Scroll list item into view
  setTimeout(()=>{
    const items=document.querySelectorAll('.v-item');
    const filtered=getFiltered(activeZone,currentQuery);
    const pos=filtered.indexOf(i);
    if(pos>=0&&items[pos]) items[pos].scrollIntoView({block:'nearest',behavior:'smooth'});
  },50);
}

function closePopup(){
  document.getElementById('popup-card').classList.remove('visible');
  activeVillage=null;
  buildList(getFiltered(activeZone,currentQuery));
}

function toggleSidebar(){
  sidebarOpen=!sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed',!sidebarOpen);
  document.getElementById('map').classList.toggle('full',!sidebarOpen);
  document.getElementById('alt-legend').classList.toggle('full',!sidebarOpen);
  document.getElementById('sidebar-toggle').textContent=sidebarOpen?'◀':'▶';
  setTimeout(()=>map.invalidateSize(),300);
}

map.on('click',()=>{
  closePopup();
});

// Initial build
buildList(getFiltered('all',''));
const bounds=VILLAGES.map(v=>[v.lat,v.lng]);
map.fitBounds(bounds,{padding:[50,50]});
</script>
</body>
</html>
