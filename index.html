<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atamnirbhar Society — Farmer Map</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- MarkerCluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <!-- PapaParse (CSV) -->
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:   #14532d;
      --green-mid:    #16a34a;
      --green-light:  #4ade80;
      --green-pale:   #dcfce7;
      --green-softer: #f0fdf4;
      --amber:        #d97706;
      --amber-pale:   #fef3c7;
      --blue:         #0369a1;
      --blue-pale:    #e0f2fe;
      --purple:       #7c3aed;
      --purple-pale:  #ede9fe;
      --coral:        #be185d;
      --coral-pale:   #fce7f3;
      --teal:         #0f766e;
      --teal-pale:    #ccfbf1;
      --gray:         #374151;
      --gray-light:   #f9fafb;
      --shadow:       0 4px 24px rgba(0,0,0,0.10);
      --shadow-sm:    0 2px 8px rgba(0,0,0,0.08);
      --radius:       14px;
      --font-body:    'Nunito', sans-serif;
      --font-display: 'Playfair Display', serif;
    }

    html, body { height: 100%; font-family: var(--font-body); background: var(--green-softer); color: var(--gray); }

    /* ── HEADER ── */
    header {
      background: var(--green-dark);
      color: #fff;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      height: 68px;
      position: sticky;
      top: 0;
      z-index: 1100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo-leaf {
      width: 40px; height: 40px;
      background: var(--green-light);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .header-title {
      font-family: var(--font-display);
      font-size: 20px;
      letter-spacing: 0.3px;
      color: #fff;
    }
    .header-sub { font-size: 12px; color: #bbf7d0; margin-top: 1px; }

    /* ── STATS STRIP ── */
    .stats-strip {
      display: flex;
      gap: 0;
      background: #fff;
      border-bottom: 1px solid #d1fae5;
      overflow-x: auto;
    }
    .stat-card {
      flex: 1;
      min-width: 90px;
      text-align: center;
      padding: 10px 8px;
      border-right: 1px solid #d1fae5;
      transition: background 0.2s;
    }
    .stat-card:last-child { border-right: none; }
    .stat-card:hover { background: var(--green-softer); }
    .stat-num {
      font-size: 22px; font-weight: 800;
      color: var(--green-mid);
      line-height: 1.1;
    }
    .stat-lbl { font-size: 10px; color: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--green-softer);
      border-bottom: 1px solid #d1fae5;
      flex-wrap: wrap;
    }
    .filter-bar label { font-size: 12px; font-weight: 700; color: var(--green-dark); white-space: nowrap; }
    .filter-bar select, .filter-bar input[type="text"] {
      border: 1.5px solid #d1fae5;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      font-family: var(--font-body);
      background: #fff;
      color: var(--gray);
      outline: none;
      min-width: 120px;
      transition: border-color 0.2s;
    }
    .filter-bar select:focus, .filter-bar input[type="text"]:focus { border-color: var(--green-mid); }
    .filter-bar input[type="text"] { min-width: 160px; }
    .btn-reset {
      background: var(--green-pale);
      color: var(--green-dark);
      border: 1.5px solid var(--green-light);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      font-family: var(--font-body);
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-reset:hover { background: var(--green-light); color: var(--green-dark); }
    .count-badge {
      margin-left: auto;
      background: var(--green-pale);
      color: var(--green-dark);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    /* ── MAP ── */
    #map {
      height: calc(100vh - 68px - 52px - 52px);
      min-height: 400px;
      width: 100%;
    }

    /* ── LOADING OVERLAY ── */
    #loading {
      position: fixed;
      inset: 0;
      background: rgba(240,253,244,0.96);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 18px;
    }
    .spinner {
      width: 54px; height: 54px;
      border: 5px solid #d1fae5;
      border-top-color: var(--green-mid);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 16px; font-weight: 700; color: var(--green-dark); }
    .loading-sub  { font-size: 13px; color: #4b7c5a; }
    #loading.hidden { display: none; }

    /* ── LEAFLET POPUP ── */
    .leaflet-popup-content-wrapper {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      padding: 0 !important;
      border-radius: 16px !important;
      overflow: visible !important;
    }
    .leaflet-popup-content { margin: 0 !important; width: auto !important; }
    .leaflet-popup-tip-container { display: none; }

    .farmer-card {
      width: 280px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      animation: popIn 0.28s cubic-bezier(0.34,1.56,0.64,1) both;
      font-family: var(--font-body);
      background: #fff;
    }
    @keyframes popIn {
      from { transform: scale(0.65) translateY(16px); opacity: 0; }
      to   { transform: scale(1)    translateY(0);    opacity: 1; }
    }
    .card-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 16px;
      border: 2.5px solid rgba(255,255,255,0.5);
      flex-shrink: 0;
      background: rgba(255,255,255,0.22);
      color: #fff;
    }
    .card-name { font-weight: 800; font-size: 15px; color: #fff; }
    .card-village { font-size: 12px; color: rgba(255,255,255,0.85); margin-top: 2px; }

    .card-body { padding: 12px 16px; background: #fff; }
    .card-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 5px 0;
      border-bottom: 0.5px solid #e5e7eb;
      font-size: 12.5px;
    }
    .card-row:last-child { border-bottom: none; }
    .card-label { color: #6b7280; font-weight: 600; display: flex; align-items: center; gap: 5px; }
    .card-value { color: #111827; font-weight: 700; text-align: right; }
    .status-pill {
      border-radius: 20px; padding: 2px 10px;
      font-size: 11px; font-weight: 700;
      border: 1px solid transparent;
    }
    .status-completed { background: #dcfce7; color: #14532d; border-color: #4ade80; }
    .status-registered { background: #fef9c3; color: #854d0e; border-color: #fbbf24; }
    .status-pending    { background: #e0f2fe; color: #075985; border-color: #38bdf8; }

    .card-footer {
      background: #f9fafb;
      border-top: 0.5px solid #e5e7eb;
      padding: 8px 16px;
      font-size: 11px; color: #9ca3af;
      display: flex; align-items: center; gap: 6px;
    }

    /* ── LEGEND ── */
    .legend {
      position: absolute;
      bottom: 30px; right: 12px;
      background: rgba(255,255,255,0.97);
      border: 1px solid #d1fae5;
      border-radius: 12px;
      padding: 12px 16px;
      z-index: 1000;
      font-family: var(--font-body);
      font-size: 12px;
      color: var(--green-dark);
      box-shadow: var(--shadow-sm);
      max-height: 280px;
      overflow-y: auto;
      min-width: 140px;
    }
    .legend h4 {
      font-size: 12px; font-weight: 800; margin-bottom: 8px;
      color: var(--green-dark);
      display: flex; align-items: center; gap: 5px;
    }
    .legend-item { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid rgba(0,0,0,0.15); }

    /* ── ERROR BANNER ── */
    #error-banner {
      display: none;
      background: #fee2e2; color: #991b1b;
      padding: 10px 18px; font-size: 13px; font-weight: 600;
      border-bottom: 1px solid #fca5a5;
    }

    /* Cluster styling */
    .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
      background: rgba(22,163,74,0.18) !important;
    }
    .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
      background: var(--green-mid) !important;
      color: #fff !important;
      font-family: var(--font-body) !important;
      font-weight: 800 !important;
      font-size: 15px !important;
      line-height: 1 !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
    }
    .marker-cluster-large { background: rgba(20,83,45,0.22) !important; }
    .marker-cluster-large div { background: var(--green-dark) !important; font-size: 17px !important; }
  </style>
</head>
<body>

<!-- Loading Overlay -->
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">🌿 Loading Farmer Data…</div>
  <div class="loading-sub">Fetching records from Google Sheets</div>
</div>

<!-- Error Banner -->
<div id="error-banner" role="alert"></div>

<!-- Header -->
<header>
  <div class="header-left">
    <div class="logo-leaf">🌿</div>
    <div>
      <div class="header-title">Atamnirbhar Society</div>
      <div class="header-sub">Farmer Field Mapping — Uttarkashi, Uttarakhand</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span id="header-count" style="font-size:12px;color:#bbf7d0;font-weight:600;"></span>
  </div>
</header>

<!-- Stats Strip -->
<div class="stats-strip">
  <div class="stat-card"><div class="stat-num" id="s-total">—</div><div class="stat-lbl">Farmers</div></div>
  <div class="stat-card"><div class="stat-num" id="s-villages">—</div><div class="stat-lbl">Villages</div></div>
  <div class="stat-card"><div class="stat-num" id="s-blocks">—</div><div class="stat-lbl">Blocks</div></div>
  <div class="stat-card"><div style="font-size:26px;line-height:1.1">🏡</div><div class="stat-num" id="s-polyhouse" style="font-size:18px">18</div><div class="stat-lbl">Polyhouses</div></div>
</div>

<!-- Filter Bar -->
<div class="filter-bar">
  <label>🔍 Search</label>
  <input type="text" id="f-search" placeholder="Name or village…" />
  <label>Block</label>
  <select id="f-block"><option value="">All Blocks</option></select>
  <label>Tahesil</label>
  <select id="f-tahesil"><option value="">All Tahesils</option></select>
  <label>Status</label>
  <select id="f-status">
    <option value="">All</option>
    <option value="completed">Completed</option>
    <option value="registered">Registered</option>
    <option value="pending">Pending</option>
  </select>
  <label>🏡 Polyhouse</label>
  <select id="f-polyhouse">
    <option value="">All</option>
    <option value="yes">Has Polyhouse</option>
    <option value="no">No Polyhouse</option>
  </select>
  <button class="btn-reset" id="btn-reset">Reset</button>
  <span class="count-badge" id="filter-count"></span>
</div>

<!-- Map Container -->
<div style="position:relative;">
  <div id="map"></div>
  <div class="legend">
    <h4>🌱 Blocks</h4>
    <div id="legend-items"></div>
    <div style="margin-top:10px;padding-top:8px;border-top:0.5px solid #d1fae5;">
      <div style="display:flex;align-items:center;gap:7px;font-size:12px;color:#065f46;font-weight:600;">
        <span style="font-size:16px">🏡</span><span>Polyhouse</span>
      </div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
//  CONFIG — Sheet IDs and GIDs
//  Sheet1 "Farmer details": gid=1503472373
//  Sheet2 (survey/map data): gid=866968192
// ─────────────────────────────────────────
const SHEET_ID = '1TUhunYkXjUaAzQuMmvF3DAquJVGjWmtPIshM2EvKkzw';
const SHEET_GID_FARMERS  = '1503472373'; // Farmer details
const SHEET_GID_MAPDATA  = '866968192';  // Sheet2 with lat/lng

function csvUrl(gid) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
}

// ─── BLOCK COLOUR PALETTE ────────────────
const BLOCK_COLORS = [
  '#16a34a','#0369a1','#7c3aed','#d97706',
  '#be185d','#0f766e','#b45309','#1d4ed8',
  '#9f1239','#065f46','#6d28d9','#92400e',
];
const blockColorMap = {};
let colorIdx = 0;
function getBlockColor(block) {
  if (!block) return '#6b7280';
  const key = block.trim().toLowerCase();
  if (!blockColorMap[key]) blockColorMap[key] = BLOCK_COLORS[colorIdx++ % BLOCK_COLORS.length];
  return blockColorMap[key];
}

// ─── VILLAGE → LAT/LNG lookup (from Sheet2) ──
// Sheet2 columns: S.No, Farmer Name, VillageName, Block, Tahesil, District, Sqm, Status, Latitude, Longitude
const villageCoords = {}; // key: "villagename|block" → {lat, lng}
const farmerCoords  = {}; // key: "farmername|village" → {lat, lng, sqm, status}
let allPolyhouses   = []; // rows that have a polyhouse value

// ─── CLUSTER MAP (small offsets for same-village farmers) ───
function jitter(lat, lng, idx) {
  const angle = (idx * 137.5) * Math.PI / 180;
  const r = 0.002 + (idx % 5) * 0.0005;
  return [lat + r * Math.sin(angle), lng + r * Math.cos(angle)];
}

// ─── AVATAR INITIALS ─────────────────────
function initials(name) {
  const parts = name.trim().split(/\s+/);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return name.substring(0, 2).toUpperCase();
}

// ─── CUSTOM MARKER — teardrop ────────────
function makeIcon(color) {
  const svg = encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="28" height="40" viewBox="0 0 28 40">
    <path d="M14 2C7.37 2 2 7.37 2 14C2 23.5 14 38 14 38C14 38 26 23.5 26 14C26 7.37 20.63 2 14 2Z"
      fill="${color}" stroke="white" stroke-width="2"/>
    <circle cx="14" cy="14" r="6" fill="white" opacity="0.9"/>
  </svg>`);
  return L.divIcon({
    className: '',
    html: `<img src="data:image/svg+xml,${svg}" width="28" height="40" style="filter:drop-shadow(0 3px 5px rgba(0,0,0,0.4))" />`,
    iconSize: [28, 40],
    iconAnchor: [14, 40],
    popupAnchor: [0, -42],
  });
}

// ─── POLYHOUSE ICON ──────────────────────
function makePolyhouseIcon() {
  return L.divIcon({
    className: '',
    html: `<div style="
      font-size:28px;
      line-height:1;
      filter:drop-shadow(0 3px 6px rgba(0,0,0,0.45));
      cursor:pointer;
      transition:transform 0.15s;
    " title="Polyhouse">🏡</div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 28],
    popupAnchor: [0, -32],
  });
}

// ─── POLYHOUSE POPUP ─────────────────────
function makePolyhousePopup(p) {
  const ini = initials(p.name);
  const color = getBlockColor(p.block);
  const hasSqm    = p.sqm    && p.sqm.trim()    !== '' && p.sqm.trim()    !== '0';
  const hasStatus = p.status && p.status.trim() !== '';
  const statusIcon = p.status === 'completed' ? '✔' : '⏳';
  return `
  <div class="farmer-card">
    <div class="card-header" style="background:linear-gradient(135deg,#064e3b,#065f46);">
      <div style="font-size:32px;line-height:1;flex-shrink:0">🏡</div>
      <div>
        <div class="card-name">Polyhouse</div>
        <div class="card-village">👤 ${p.name}</div>
      </div>
    </div>
    <div class="card-body">
      <div class="card-row">
        <span class="card-label">📍 Village</span>
        <span class="card-value">${p.village || '—'}</span>
      </div>
      <div class="card-row">
        <span class="card-label">🏘 Block</span>
        <span class="card-value">${p.block || '—'}</span>
      </div>
      <div class="card-row">
        <span class="card-label">🗺 Tahesil</span>
        <span class="card-value">${p.tahesil || '—'}</span>
      </div>
      <div class="card-row">
        <span class="card-label">🏡 Type / Info</span>
        <span class="card-value">${p.polyhouse}</span>
      </div>
      ${hasSqm ? `<div class="card-row">
        <span class="card-label">📐 Area</span>
        <span class="card-value">${p.sqm} sq.m</span>
      </div>` : ''}
      ${hasStatus ? `<div class="card-row">
        <span class="card-label">📋 Status</span>
        <span class="card-value"><span class="status-pill status-${p.status.toLowerCase()}">${statusIcon} ${p.status}</span></span>
      </div>` : ''}
      <div class="card-row">
        <span class="card-label">🧭 Coords</span>
        <span class="card-value" style="font-size:11px">${parseFloat(p.lat).toFixed(5)}, ${parseFloat(p.lng).toFixed(5)}</span>
      </div>
    </div>
    <div class="card-footer" style="background:#ecfdf5;border-top:0.5px solid #a7f3d0;">🌿 Polyhouse — Atamnirbhar Society</div>
  </div>`;
}

// ─── RENDER POLYHOUSE MARKERS ─────────────
function renderPolyhouses() {
  polyhouseLayer.clearLayers();
  if (allPolyhouses.length === 0) return;
  allPolyhouses.forEach(p => {
    if (!p.lat || !p.lng) return;
    const marker = L.marker([p.lat, p.lng], { icon: makePolyhouseIcon(), zIndexOffset: 500 });
    marker.bindPopup(makePolyhousePopup(p), { maxWidth: 300, minWidth: 280 });
    polyhouseLayer.addLayer(marker);
  });
}


function makePopup(f) {
  const color = getBlockColor(f.block);
  const ini = initials(f.name);
  const statusClass = f.status ? `status-${f.status.toLowerCase().replace(/\s+/g,'-')}` : '';
  const statusLabel = f.status ? f.status.charAt(0).toUpperCase() + f.status.slice(1) : '';
  const statusIcon  = f.status === 'completed' ? '✔' : f.status === 'pending' ? '⏳' : '📋';
  const hasSqm      = f.sqm && String(f.sqm).trim() !== '' && String(f.sqm).trim() !== '0';
  const hasStatus   = f.status && f.status.trim() !== '';
  const hasPolyhouse= f.polyhouse && String(f.polyhouse).trim() !== '';
  return `
  <div class="farmer-card">
    <div class="card-header" style="background:linear-gradient(135deg, ${color}dd, ${color});">
      <div class="avatar">${ini}</div>
      <div>
        <div class="card-name">${f.name}</div>
        <div class="card-village">📍 ${f.village || '—'}</div>
      </div>
    </div>
    <div class="card-body">
      <div class="card-row">
        <span class="card-label">🏘 Block</span>
        <span class="card-value">${f.block || '—'}</span>
      </div>
      <div class="card-row">
        <span class="card-label">🏛 Post Office</span>
        <span class="card-value">${f.postoffice || f.tahesil || '—'}</span>
      </div>
      <div class="card-row">
        <span class="card-label">🗺 Tahesil</span>
        <span class="card-value">${f.tahesil || '—'}</span>
      </div>
      ${hasSqm ? `<div class="card-row">
        <span class="card-label">📐 Area</span>
        <span class="card-value">${f.sqm} sq.m</span>
      </div>` : ''}
      ${hasPolyhouse ? `<div class="card-row">
        <span class="card-label">🏡 Polyhouse</span>
        <span class="card-value">${f.polyhouse}</span>
      </div>` : ''}
      ${f.pincode ? `<div class="card-row">
        <span class="card-label">📮 PIN</span>
        <span class="card-value">${f.pincode}</span>
      </div>` : ''}
      ${hasStatus ? `<div class="card-row">
        <span class="card-label">📋 Status</span>
        <span class="card-value"><span class="status-pill ${statusClass}">${statusIcon} ${statusLabel}</span></span>
      </div>` : ''}
      ${f.lat ? `<div class="card-row">
        <span class="card-label">🧭 Coords</span>
        <span class="card-value" style="font-size:11px">${parseFloat(f.lat).toFixed(5)}, ${parseFloat(f.lng).toFixed(5)}</span>
      </div>` : ''}
    </div>
    <div class="card-footer">🌱 Atamnirbhar Society &nbsp;|&nbsp; S.No: ${f.sno || '—'}</div>
  </div>`;
}

// ─── MAP INIT ────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([30.95, 78.15], 9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
  maxZoom: 18
}).addTo(map);

// Optional: satellite layer toggle
const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: '© Esri', maxZoom: 18
});
const baseMaps = { '🗺 Map': L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}), '🛰 Satellite': satellite };
const overlayMaps = { '🏡 Polyhouses': polyhouseLayer };
L.control.layers(baseMaps, overlayMaps, { position: 'topright' }).addTo(map);

let clusterGroup = L.markerClusterGroup({ maxClusterRadius: 50, showCoverageOnHover: false });
map.addLayer(clusterGroup);

// Polyhouse layer — separate, always on top
let polyhouseLayer = L.layerGroup().addTo(map);

// ─── DATA ────────────────────────────────
let allFarmers = [];
let filteredFarmers = [];

async function loadData() {
  try {
    // 1. Load Sheet2 (map data with lat/lng)
    const mapRaw = await fetchCSV(csvUrl(SHEET_GID_MAPDATA));
    parseMapSheet(mapRaw);

    // 2. Load Sheet1 (farmer details ~1000 rows)
    const farmRaw = await fetchCSV(csvUrl(SHEET_GID_FARMERS));
    parseFarmerSheet(farmRaw);

    // 3. Render
    buildFilters();
    renderMarkers(allFarmers);
    renderPolyhouses();
    updateStats(allFarmers);
    setupFilters();

    document.getElementById('loading').classList.add('hidden');
  } catch(e) {
    console.error(e);
    document.getElementById('loading').classList.add('hidden');
    const eb = document.getElementById('error-banner');
    eb.style.display = 'block';
    eb.textContent = '⚠️ Could not load data: ' + e.message + '. Make sure the sheet is set to "Anyone with link can view".';
  }
}

function fetchCSV(url) {
  return new Promise((resolve, reject) => {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => {
      controller.abort();
      reject(new Error('Request timed out (15s). Check your internet connection or sheet sharing settings.'));
    }, 15000);

    fetch(url, { signal: controller.signal })
      .then((res) => {
        clearTimeout(timeoutId);
        if (!res.ok) {
          throw new Error('HTTP ' + res.status + ' — sheet may not be public.');
        }
        return res.text();
      })
      .then((text) => {
        const parsed = Papa.parse(text, { skipEmptyLines: true });
        resolve(parsed.data);
      })
      .catch((err) => {
        clearTimeout(timeoutId);
        if (err.name === 'AbortError') return; // already rejected via timeout
        reject(err);
      });
  });
}

// ─── PARSE SHEET 2 (survey data) ──────────
// Columns: S.No, Farmer Name, VillageName, Block, Tahesil, District, Sqm, Status, Latitude, Longitude
function parseMapSheet(rows) {
  // Find header row
  let hdrIdx = -1;
  for (let i = 0; i < Math.min(10, rows.length); i++) {
    const r = rows[i].map(c => c.toLowerCase().trim());
    if (r.some(c => c.includes('latitude') || c.includes('lat'))) { hdrIdx = i; break; }
  }
  if (hdrIdx < 0) return;
  const hdr = rows[hdrIdx].map(c => c.toLowerCase().trim());
  const col = (names) => { for (const n of names) { const i = hdr.findIndex(h => h.includes(n)); if (i >= 0) return i; } return -1; };
  const iLat = col(['latitude','lat']);
  const iLng = col(['longitude','lng','lon']);
  const iVil = col(['village','villagename']);
  const iBlk = col(['block']);
  const iTah = col(['tahesil','tahsil']);
  const iSqm = col(['sqm','area']);
  const iSta = col(['status']);
  const iName= col(['farmer','name']);
  const iSno = col(['s.no','sno','s. no']);
  const iPoly= col(['polyhouse','poly house','greenhouse']);

  for (let i = hdrIdx + 1; i < rows.length; i++) {
    const r = rows[i];
    const lat = parseFloat(r[iLat]);
    const lng = parseFloat(r[iLng]);
    if (isNaN(lat) || isNaN(lng)) continue;

    const village = r[iVil] ? r[iVil].trim() : '';
    const block   = r[iBlk] ? r[iBlk].trim() : '';
    const name    = iName >= 0 ? (r[iName] || '').trim() : '';
    const sno     = iSno >= 0 ? (r[iSno] || '').trim() : String(i);

    // Store village coords
    const vkey = (village + '|' + block).toLowerCase();
    if (!villageCoords[vkey]) villageCoords[vkey] = { lat, lng };

    // Store farmer with coords
    farmerCoords[name.toLowerCase()] = {
      lat, lng,
      sqm:       iSqm  >= 0 ? r[iSqm]  : '',
      status:    iSta  >= 0 ? r[iSta]  : '',
      tahesil:   iTah  >= 0 ? r[iTah]  : '',
      polyhouse: iPoly >= 0 ? r[iPoly] : '',
      sno,
    };

    // If this row has a polyhouse value, record it separately
    const polyVal = iPoly >= 0 ? (r[iPoly] || '').trim() : '';
    if (polyVal && polyVal.toLowerCase() !== 'no' && polyVal.toLowerCase() !== 'n' && polyVal !== '0') {
      allPolyhouses.push({
        name, village, block,
        tahesil: iTah >= 0 ? (r[iTah] || '').trim() : '',
        sqm:     iSqm >= 0 ? (r[iSqm] || '').trim() : '',
        status:  iSta >= 0 ? (r[iSta] || '').trim() : '',
        polyhouse: polyVal,
        lat, lng, sno,
      });
    }
  }
}

// ─── PARSE SHEET 1 (farmer registry ~1000) ─
// Columns: S.no, Vill. S. No., Name, Block, Post office, Tahesil, District, Pincode
// Rows start after the village header row (yellow merged row like "Kharsali")
function parseFarmerSheet(rows) {
  // Find header row (has "S.no" / "Name")
  let hdrIdx = -1;
  for (let i = 0; i < Math.min(10, rows.length); i++) {
    const r = rows[i].map(c => c.toLowerCase().trim());
    if (r.some(c => c.includes('s.no') || c === 'name')) { hdrIdx = i; break; }
  }
  if (hdrIdx < 0) {
    // Fallback: try row 2 (0-indexed)
    hdrIdx = 2;
  }
  const hdr = rows[hdrIdx].map(c => c.toLowerCase().trim());
  const col = (names) => { for (const n of names) { const i = hdr.findIndex(h => h.includes(n)); if (i >= 0) return i; } return -1; };

  const iSno    = col(['s.no','sno']);
  const iName   = col(['name']);
  const iBlock  = col(['block']);
  const iPost   = col(['post']);
  const iTahesil= col(['tahesil','tahsil']);
  const iDist   = col(['district']);
  const iPin    = col(['pincode','pin']);

  let currentVillage = '';
  const villageOrder = {}; // track per-village index for jitter

  for (let i = hdrIdx + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 3) continue;

    const raw = r.map(c => (c || '').trim());

    // Detect village header row (merged/yellow row — usually has text in col 1-3, nothing numeric in sno col)
    const snoVal = iSno >= 0 ? raw[iSno] : raw[1];
    if (isNaN(Number(snoVal)) && snoVal !== '') {
      // Could be a village name row — check if Name col is empty or same as snoVal
      const nameVal = iName >= 0 ? raw[iName] : raw[3];
      if (!nameVal || nameVal === snoVal) {
        // It's a village header row
        currentVillage = snoVal || raw[2] || raw[3] || '';
        continue;
      }
    }
    if (!snoVal && !(iName >= 0 ? raw[iName] : raw[3])) continue;

    const name    = iName    >= 0 ? raw[iName]    : raw[3];
    const block   = iBlock   >= 0 ? raw[iBlock]   : raw[4];
    const post    = iPost    >= 0 ? raw[iPost]     : raw[5];
    const tahesil = iTahesil >= 0 ? raw[iTahesil]  : raw[6];
    const district= raw[7] || 'Uttarkashi';
    const pincode = iPin     >= 0 ? raw[iPin]      : raw[8];

    if (!name) continue;

    // ── Resolve coordinates ──────────────
    // Priority: 1. Exact name match from Sheet2, 2. Village match, 3. Approximate from block
    let lat, lng, sqm = '', status = '', polyhouse = '';

    const fc = farmerCoords[name.toLowerCase()];
    if (fc) {
      lat       = fc.lat;
      lng       = fc.lng;
      sqm       = fc.sqm;
      status    = fc.status || 'registered';
      polyhouse = fc.polyhouse || '';
    } else {
      // Try village lookup
      const vkey = (currentVillage + '|' + block).toLowerCase();
      const vc   = villageCoords[vkey];
      if (vc) {
        const vidx = villageOrder[vkey] || 0;
        villageOrder[vkey] = vidx + 1;
        [lat, lng] = jitter(vc.lat, vc.lng, vidx);
      } else {
        // Approximate by block name — known Uttarkashi coords
        const blockApprox = {
          'barkot':  [30.80, 78.22],
          'नोगांव': [31.00, 78.10],
          'nogaon':  [31.00, 78.10],
          'मोरी':   [31.20, 78.00],
          'mori':    [31.20, 78.00],
          'पुरोला': [30.85, 77.98],
          'purola':  [30.85, 77.98],
          'dunda':   [30.92, 78.32],
          'डुंडा':  [30.92, 78.32],
          'chiniyalisaur': [30.55, 78.42],
          'bhatkot': [31.10, 78.50],
          'naugaon': [31.00, 78.10],
        };
        const bkey = block.toLowerCase();
        const approx = blockApprox[bkey];
        if (approx) {
          const vidx = villageOrder[bkey] || 0;
          villageOrder[bkey] = vidx + 1;
          [lat, lng] = jitter(approx[0], approx[1], vidx + allFarmers.length);
        } else {
          // Last resort: place in Uttarkashi area
          [lat, lng] = jitter(30.92, 78.27, allFarmers.length);
        }
      }
      status = 'registered';
    }

    allFarmers.push({
      sno: snoVal || String(i),
      name, block, postoffice: post, tahesil, district, pincode,
      village: currentVillage || tahesil,
      lat, lng, sqm, status, polyhouse,
    });
  }
  filteredFarmers = [...allFarmers];
}

// ─── RENDER MARKERS ──────────────────────
function renderMarkers(farmers) {
  clusterGroup.clearLayers();
  farmers.forEach(f => {
    if (!f.lat || !f.lng) return;
    const color  = getBlockColor(f.block);
    const marker = L.marker([f.lat, f.lng], { icon: makeIcon(color) });
    marker.bindPopup(makePopup(f), { maxWidth: 300, minWidth: 280, className: 'herb-popup' });
    clusterGroup.addLayer(marker);
  });
  buildLegend();
  document.getElementById('filter-count').textContent = `${farmers.length} farmer${farmers.length !== 1 ? 's' : ''} shown`;
  document.getElementById('header-count').textContent = `${farmers.length} farmers`;
}

// ─── STATS ───────────────────────────────
function updateStats(farmers) {
  document.getElementById('s-total').textContent    = farmers.length.toLocaleString();
  document.getElementById('s-villages').textContent = new Set(farmers.map(f => f.village)).size;
  document.getElementById('s-blocks').textContent   = new Set(farmers.map(f => f.block)).size;
  // Polyhouse is fixed at 18
}

// ─── LEGEND ──────────────────────────────
function buildLegend() {
  const container = document.getElementById('legend-items');
  container.innerHTML = '';
  const seen = new Set();
  allFarmers.forEach(f => {
    if (!f.block || seen.has(f.block)) return;
    seen.add(f.block);
    const color = getBlockColor(f.block);
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${color}"></div><span>${f.block}</span>`;
    container.appendChild(item);
  });
}

// ─── FILTERS ─────────────────────────────
function buildFilters() {
  const blocks   = [...new Set(allFarmers.map(f => f.block).filter(Boolean))].sort();
  const tahesils = [...new Set(allFarmers.map(f => f.tahesil).filter(Boolean))].sort();
  const bSel = document.getElementById('f-block');
  const tSel = document.getElementById('f-tahesil');
  blocks.forEach(b   => { const o = document.createElement('option'); o.value = b; o.textContent = b; bSel.appendChild(o); });
  tahesils.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; tSel.appendChild(o); });
}

function applyFilters() {
  const search    = document.getElementById('f-search').value.toLowerCase().trim();
  const block     = document.getElementById('f-block').value;
  const tahesil   = document.getElementById('f-tahesil').value;
  const status    = document.getElementById('f-status').value;
  const polyhouse = document.getElementById('f-polyhouse').value;

  filteredFarmers = allFarmers.filter(f => {
    if (block   && f.block   !== block)   return false;
    if (tahesil && f.tahesil !== tahesil) return false;
    if (status  && f.status  !== status)  return false;
    if (polyhouse === 'yes') {
      const pv = (f.polyhouse || '').trim().toLowerCase();
      if (!pv || pv === 'no' || pv === 'n' || pv === '0') return false;
    }
    if (polyhouse === 'no') {
      const pv = (f.polyhouse || '').trim().toLowerCase();
      if (pv && pv !== 'no' && pv !== 'n' && pv !== '0') return false;
    }
    if (search) {
      const hay = (f.name + '|' + f.village + '|' + f.block).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  renderMarkers(filteredFarmers);
  updateStats(filteredFarmers);

  if (filteredFarmers.length > 0 && filteredFarmers.length < allFarmers.length) {
    const pts = filteredFarmers.filter(f => f.lat && f.lng).map(f => [f.lat, f.lng]);
    if (pts.length > 0) {
      try { map.fitBounds(pts, { padding: [40, 40] }); } catch(e) {}
    }
  }
}

function setupFilters() {
  document.getElementById('f-search').addEventListener('input',    applyFilters);
  document.getElementById('f-block').addEventListener('change',    applyFilters);
  document.getElementById('f-tahesil').addEventListener('change',  applyFilters);
  document.getElementById('f-status').addEventListener('change',   applyFilters);
  document.getElementById('f-polyhouse').addEventListener('change',applyFilters);
  document.getElementById('btn-reset').addEventListener('click', () => {
    document.getElementById('f-search').value    = '';
    document.getElementById('f-block').value     = '';
    document.getElementById('f-tahesil').value   = '';
    document.getElementById('f-status').value    = '';
    document.getElementById('f-polyhouse').value = '';
    applyFilters();
    map.setView([30.95, 78.15], 9);
  });
}

// ─── KICK OFF ────────────────────────────
loadData();
</script>
